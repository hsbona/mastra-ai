# ============================================================
# XpertIA - Docker Compose para Desenvolvimento
# ============================================================
# VM: 24GB RAM | 8 Cores CPU
# ============================================================
# Recursos alocados:
# - SO: ~4GB RAM + 2 cores (reserva)
# - PostgreSQL: 6GB RAM + 3 cores
# - Nginx: 1GB RAM + 0.5 core
# Total: ~11GB RAM + 5.5 cores (com overhead)
# ============================================================
# NOTA: LLM via Alibaba Cloud (Qwen 3.5) - não requer infra local
# ============================================================
# NOTA SOBRE REDIS: Redis foi removido da arquitetura.
# Toda a persistência usa PostgreSQL exclusivamente.
# ============================================================
# ATUALIZAÇÃO: Acesso direto ao PostgreSQL (porta 5432 aberta)
# Data: 2026-03-12
# ============================================================

version: '3.9'

services:
  # ============================================================
  # PostgreSQL + pgvector
  # Recursos: 6GB RAM | 3 cores
  # STATUS: OBRIGATÓRIO - Usado para dados, memória e vetores
  # ACESSO: Direto via porta 5432 (SSL obrigatório)
  # ============================================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: xpertia-postgres
    hostname: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-xpertia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xpertia_dev}
      POSTGRES_DB: ${POSTGRES_DB:-xpertia}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=pt_BR.UTF-8"
      # ============================================================
      # Tuning PostgreSQL para 24GB RAM (Otimizado 2026-03-12)
      # ============================================================
      POSTGRES_SHARED_BUFFERS: "6GB"              # 25% da RAM total
      POSTGRES_EFFECTIVE_CACHE_SIZE: "18GB"       # 75% da RAM total
      POSTGRES_WORK_MEM: "64MB"                   # Memória por operação
      POSTGRES_MAINTENANCE_WORK_MEM: "512MB"      # VACUUM, CREATE INDEX
      POSTGRES_MAX_CONNECTIONS: "200"             # Conexões simultâneas
      # WAL e checkpoint tuning
      POSTGRES_WAL_BUFFERS: "16MB"
      POSTGRES_MIN_WAL_SIZE: "1GB"
      POSTGRES_MAX_WAL_SIZE: "4GB"
      POSTGRES_CHECKPOINT_COMPLETION_TARGET: "0.9"
      # Query planner
      POSTGRES_RANDOM_PAGE_COST: "1.1"            # Para SSD
      POSTGRES_EFFECTIVE_IO_CONCURRENCY: "200"
    ports:
      # Acesso direto - porta 5432 aberta para conexões externas
      - "0.0.0.0:5432:5432"
    volumes:
      # Volume de dados persistente
      - type: volume
        source: postgres_data
        target: /var/lib/postgresql/data
      # Scripts de inicialização (executados na primeira vez)
      - type: bind
        source: ../configs/postgres-init
        target: /docker-entrypoint-initdb.d
        read_only: true
      # Scripts SQL da XpertIA
      - type: bind
        source: ../postgreSQL
        target: /sql-scripts
        read_only: true
      # Certificados SSL (montados apenas se existirem)
      - type: bind
        source: ../configs/postgres-ssl
        target: /var/lib/postgresql/ssl
        read_only: true
        bind:
          create_host_path: true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xpertia} -d ${POSTGRES_DB:-xpertia}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - xpertia-backend
    deploy:
      resources:
        limits:
          cpus: '3.0'
          memory: 6G
        reservations:
          cpus: '0.5'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    # Comando customizado para aplicar configurações adicionais via postgres.conf
    command: >
      postgres
      -c ssl=on
      -c ssl_cert_file=/var/lib/postgresql/ssl/server.crt
      -c ssl_key_file=/var/lib/postgresql/ssl/server.key
      -c ssl_ca_file=/var/lib/postgresql/ssl/ca.crt

  # ============================================================
  # Nginx - APENAS para health check e serviços futuros
  # Recursos: 1GB RAM | 0.5 core
  # NOTA: Proxy do Ollama removido (usando Alibaba Cloud Qwen)
  # STATUS: OPCIONAL
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: xpertia-nginx
    hostname: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - type: bind
        source: ../configs/nginx/nginx.conf
        target: /etc/nginx/nginx.conf
        read_only: true
      - type: bind
        source: ../configs/nginx/conf.d
        target: /etc/nginx/conf.d
        read_only: true
    networks:
      - xpertia-backend
      - xpertia-frontend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local

networks:
  xpertia-backend:
    driver: bridge
    internal: false
  xpertia-frontend:
    driver: bridge
